name: Stock
version: '1.0-SNAPSHOT'
main: erze.stock.Stock
api-version: '1.20'
commands:
  주식:
    description: 주식 구매 GUI를 엽니다.
    usage: /<command>
    permission: e-stock.stock
  주식관리:
    description: 주식 관리 명령어
    usage: /<command>
    permission: e-stock.manage
    permission-message: 권한이 없습니다.

permissions:
  e-stock.stock:
    description: 주식 구매 GUI 열기
    default: true
  e-stock.manage:
    description: 주식 관리 명령어 사용 권한
    default: op